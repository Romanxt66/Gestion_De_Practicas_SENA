version: '3.8'

services:
  web:
    build: .
    container_name: sena_flask_app
    expose:
      - "5001"
    volumes:
      - .:/app
      # Evitamos sobrescribir los directorios de entorno virtual y caché generados localmente
      - /app/.venv
      - /app/__pycache__
    environment:
      - FLASK_ENV=development
      - FLASK_APP=run.py
      - DATABASE_URL=postgresql+psycopg://admin:1052020405Nr.@postgres-db:5432/master_db
    networks:
      - coolify
    restart: unless-stopped

networks:
  coolify:
    external: true
